<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verify Your Email</title>
</head>
<body>
    <h2>Welcome to Housing & Properties!</h2>
    <p>Hi {{ email }},</p>
    <p>Your verification link is <strong>{{ verification_link }}</strong></p>
    <p>This code will expire in {{ expiry_minutes }} minutes.</p>

    <p>If you did not create an account with Housing & Properties, please ignore this email.</p>
</body>
</html>
