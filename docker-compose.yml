services:
  redis:
    image: redis:7-alpine
    command: redis-server --requirepass ${REDIS_PASSWORD}
    ports:
      - "6379:6379"
    env_file:
      - .env
    volumes:
      - redis_data:/data
  web:
    build: .
    command: sh -c "chmod +x /app/startup.sh && /app/startup.sh"
    volumes:
      - .:/app
      - static_files:/app/staticfiles
      - media_files:/app/media
    ports:
      - "8000:8000"
    env_file:
      - .env
  celery:
    build: .
    command: uv run celery -A core.infrastructure.celery.app worker --loglevel=info
    volumes:
      - .:/app
    env_file:
      - .env
    depends_on:
      - web
      - redis
volumes:
  static_files:
  media_files:
  redis_data: