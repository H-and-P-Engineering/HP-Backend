services:
  web:
    build: .
    command: sh -c "uv run manage.py collectstatic --noinput && uv run manage.py migrate && uv run gunicorn config.wsgi:application --bind 0.0.0.0:8000"
    volumes:
      - .:/app
      - ./staticfiles:/app/staticfiles
      - ./media:/app/media
    ports:
      - "8000:8000"
    env_file:
      - .env

volumes:
  static_volume:
  media_volume: 